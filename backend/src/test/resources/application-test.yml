spring:
  datasource:
    url: jdbc:h2:mem:truck_platform_test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20

app:
  jwt:
    secret: test-jwt-secret-key-for-ci-at-least-32-characters
